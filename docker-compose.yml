services:
  postgres:
    image: postgres:16-alpine
    container_name: meatdata-postgres

    environment:
      POSTGRES_DB: meatdata
      POSTGRES_USER: meatdata_user
      POSTGRES_PASSWORD: meatdata_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meatdata_user -d meatdata"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: